<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">R</div>
      <h2 style="font-size:1.5rem; color:var(--text-main);">Create Account</h2>
      <p style="color:var(--text-muted); font-size:0.9rem; margin-top:0.25rem;">Join RetailOrder to start ordering</p>
    </div>

    @if (errorMessage()) {
      <div class="error-msg">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="userName">Full Name</label>
        <input type="text" id="userName" [(ngModel)]="userName" name="userName" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="userEmail">Email Address</label>
        <input type="email" id="userEmail" [(ngModel)]="userEmail" name="userEmail" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="passwordHash">Password</label>
        <input type="password" id="passwordHash" [(ngModel)]="passwordHash" name="passwordHash" placeholder="Choose a strong password" required>
      </div>
      <button type="submit" class="btn-primary" [disabled]="isLoading()" style="width:100%; margin-top:0.5rem;">
        {{ isLoading() ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p style="text-align:center; margin-top:1.25rem; color:var(--text-muted); font-size:0.9rem;">
      Already have an account?
      <a routerLink="/login" style="color:var(--primary); font-weight:600; text-decoration:none;">Sign in</a>
    </p>
  </div>
</div>
